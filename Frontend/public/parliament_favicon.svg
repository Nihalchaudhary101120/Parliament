<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark navy background -->
  <rect width="64" height="64" rx="10" fill="#1a2744"/>

  <!-- Dome -->
  <ellipse cx="32" cy="20" rx="10" ry="3.5" fill="#c9a227"/>
  <path d="M22 20 Q22 11 32 9.5 Q42 11 42 20 Z" fill="#e8b830"/>

  <!-- Lantern -->
  <rect x="29" y="7" width="6" height="4" rx="1" fill="#c9a227"/>
  <rect x="30.5" y="4" width="3" height="4" rx="1" fill="#e8b830"/>

  <!-- Flag -->
  <line x1="32" y1="4" x2="32" y2="0.5" stroke="#e8b830" stroke-width="0.7" stroke-linecap="round"/>
  <polygon points="32,0.5 37,2 32,4" fill="#cc3333"/>

  <!-- Frieze -->
  <rect x="18" y="23" width="28" height="2.5" rx="1" fill="#c9a227"/>

  <!-- Main body -->
  <rect x="20" y="25.5" width="24" height="14" rx="1" fill="#e8b830"/>

  <!-- Columns -->
  <rect x="21.5" y="25.5" width="2" height="14" rx="0.5" fill="#f5d060"/>
  <rect x="25" y="25.5" width="2" height="14" rx="0.5" fill="#f5d060"/>
  <rect x="28.5" y="25.5" width="2" height="14" rx="0.5" fill="#f5d060"/>
  <rect x="33.5" y="25.5" width="2" height="14" rx="0.5" fill="#f5d060"/>
  <rect x="37" y="25.5" width="2" height="14" rx="0.5" fill="#f5d060"/>
  <rect x="40.5" y="25.5" width="2" height="14" rx="0.5" fill="#f5d060"/>

  <!-- Door -->
  <rect x="29.5" y="32" width="5" height="7.5" rx="1" fill="#1a2744"/>

  <!-- Steps -->
  <rect x="16" y="39.5" width="32" height="2" rx="0.5" fill="#c9a227"/>
  <rect x="14" y="41.5" width="36" height="2" rx="0.5" fill="#b8911f"/>

  <!-- Crossed maces -->
  <line x1="19" y1="50" x2="45" y2="62" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="50" x2="19" y2="62" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>

  <!-- Mace heads -->
  <circle cx="18" cy="49.5" r="3" fill="#e8b830"/>
  <circle cx="46" cy="49.5" r="3" fill="#e8b830"/>
  <circle cx="18" cy="62.5" r="3" fill="#e8b830"/>
  <circle cx="46" cy="62.5" r="3" fill="#e8b830"/>
</svg>
